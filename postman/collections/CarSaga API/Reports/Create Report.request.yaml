$kind: http-request
name: Create Report
method: POST
url: '{{baseUrl}}/api/reports'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "car": "{{carId}}",
      "overallScore": 85,
      "riskLevel": "low",
      "summary": "Car is in good condition."
    }
