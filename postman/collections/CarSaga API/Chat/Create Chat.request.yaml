$kind: http-request
name: Create Chat
method: POST
url: '{{baseUrl}}/api/chat'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "reportId": "{{reportId}}"
    }
