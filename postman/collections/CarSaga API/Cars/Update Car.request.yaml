$kind: http-request
name: Update Car
method: PUT
url: '{{baseUrl}}/api/cars/{{carId}}'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: carId
    value: '{{carId}}'
body:
  type: json
  content: |-
    {
      "mileage": 20000,
      "status": "verified",
      "riskLevel": "low"
    }
