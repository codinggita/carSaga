$kind: http-request
name: Create Car
method: POST
url: '{{baseUrl}}/api/cars'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "vin": "1HGCM82633A004352",
      "make": "Toyota",
      "model": "Corolla",
      "year": 2022,
      "mileage": 15000,
      "location": "Mumbai",
      "riskLevel": "low"
    }
