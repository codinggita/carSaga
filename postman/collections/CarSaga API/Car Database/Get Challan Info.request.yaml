$kind: http-request
name: Get Challan Info
method: POST
url: '{{baseUrl}}/api/car-database/challan'
order: 5000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "reg_no": "MH01AB1234"
    }
