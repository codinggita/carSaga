$kind: http-request
name: Update Profile
method: PATCH
url: '{{baseUrl}}/api/auth/profile'
order: 5000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "New Name",
      "avatar": "https://example.com/avatar.jpg",
      "currentPassword": "oldpass",
      "newPassword": "newpass",
      "otp": "123456"
    }
